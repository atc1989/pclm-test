services:
  paddle-ocr:
    build:
      context: ./services/paddle-ocr
    image: gutguard-paddle-ocr:local
    platform: linux/amd64
    ports:
      - "8001:8001"
    environment:
      PADDLE_OCR_LANG: en
      PADDLE_OCR_MAX_PDF_PAGES: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
