<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0C1017">
<title>GutGuard — Welcome Back</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ─────────────────────────────────────────
   RESET & TOKENS
───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:      #0C1017;
  --bg2:     #131B25;
  --bl:      #3B82C8;
  --bl-dim:  rgba(59,130,200,.12);
  --bl-glow: rgba(59,130,200,.22);
  --grn:     #5CB882;
  --red:     #D42020;
  --w:       #ffffff;
  --d1:      rgba(255,255,255,.92);
  --d2:      rgba(255,255,255,.72);
  --d3:      rgba(255,255,255,.45);
  --d4:      rgba(255,255,255,.22);
  --d5:      rgba(255,255,255,.08);
  --bdr:     rgba(255,255,255,.09);
  --f:       'Outfit', -apple-system, sans-serif;
  --ease:    cubic-bezier(.4,0,.2,1);
  --spring:  cubic-bezier(.34,1.56,.64,1);
  --r-sm:    10px;
  --r-md:    14px;
  --r-lg:    20px;
}

html { height: 100%; background: var(--bg); }

body {
  min-height: 100%;
  font-family: var(--f);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--bg);
  color: var(--d1);
  overscroll-behavior: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ─────────────────────────────────────────
   PAGE SHELL
───────────────────────────────────────── */
.page {
  min-height: 100vh;
  min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ─────────────────────────────────────────
   AMBIENT BACKGROUND
───────────────────────────────────────── */
.bg-glow {
  position: absolute;
  pointer-events: none;
  z-index: 0;
}
.bg-glow-top {
  top: -160px; left: 50%;
  transform: translateX(-50%);
  width: 560px; height: 560px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%,
    rgba(59,130,200,.13) 0%,
    rgba(59,130,200,.05) 35%,
    transparent 70%);
  animation: glow-pulse 5s ease-in-out infinite;
}
.bg-glow-bottom {
  bottom: -80px; left: 50%;
  transform: translateX(-50%);
  width: 380px; height: 380px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(92,184,130,.06) 0%,
    transparent 65%);
}
@keyframes glow-pulse {
  0%,100% { opacity: .8; transform: translateX(-50%) scale(1); }
  50%      { opacity: 1;  transform: translateX(-50%) scale(1.06); }
}

/* Subtle noise grain */
.bg-grain {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 180px;
}

/* ─────────────────────────────────────────
   ANIMATION UTILITIES
───────────────────────────────────────── */
@keyframes rise {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fade-in {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%      { transform:translateX(-7px); }
  60%      { transform:translateX(7px); }
  80%      { transform:translateX(-3px); }
}
@keyframes spin {
  to { transform:rotate(360deg); }
}
@keyframes pop-in {
  from { opacity:0; transform:scale(.9); }
  to   { opacity:1; transform:scale(1); }
}

.anim-0 { animation: rise .5s var(--ease) 0s    both; }
.anim-1 { animation: rise .5s var(--ease) .10s  both; }
.anim-2 { animation: rise .5s var(--ease) .22s  both; }
.anim-3 { animation: rise .5s var(--ease) .34s  both; }
.anim-4 { animation: rise .5s var(--ease) .46s  both; }
.anim-5 { animation: rise .5s var(--ease) .58s  both; }

/* ─────────────────────────────────────────
   NAV
───────────────────────────────────────── */
.nav {
  display: flex;
  align-items: center;
  padding: clamp(18px,5vw,24px) clamp(20px,6vw,28px) 0;
  position: relative; z-index: 1;
}
.logo {
  display: flex; align-items: center; gap: 10px;
}
.logo-mark {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: linear-gradient(145deg, #4A9AE8, #2E6EB5);
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    0 4px 16px rgba(59,130,200,.35),
    0 0 0 1px rgba(255,255,255,.08) inset;
  flex-shrink: 0;
}
.logo-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--d1);
  letter-spacing: -.025em;
}

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */
.hero {
  padding: clamp(36px,9vw,52px) clamp(20px,6vw,28px) 0;
  position: relative; z-index: 1;
}
.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(59,130,200,.20);
  background: rgba(59,130,200,.08);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  color: rgba(59,130,200,.80);
  text-transform: uppercase;
  margin-bottom: 18px;
}
.hero-tag::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--bl);
  box-shadow: 0 0 6px var(--bl);
}
.headline {
  font-size: clamp(38px,11vw,52px);
  font-weight: 900;
  line-height: .95;
  letter-spacing: -.05em;
  color: var(--d1);
  margin-bottom: 16px;
}
.headline em {
  font-style: normal;
  color: var(--d2);
  font-weight: 300;
}
.subline {
  font-size: clamp(15px,4.2vw,17px);
  font-weight: 400;
  color: var(--d3);
  line-height: 1.55;
  max-width: 260px;
}

/* ─────────────────────────────────────────
   FORM SECTION
───────────────────────────────────────── */
.form-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 32px clamp(20px,6vw,28px) 0;
  position: relative; z-index: 1;
}

/* Field label */
.field-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--d4);
  text-transform: uppercase;
  margin-bottom: 9px;
}

/* Phone input */
.phone-field {
  display: flex;
  align-items: center;
  background: var(--d5);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r-md);
  transition: border-color .2s, box-shadow .2s, background .2s;
  margin-bottom: 10px;
  position: relative;
}
.phone-field:focus-within {
  border-color: rgba(59,130,200,.55);
  box-shadow: 0 0 0 4px rgba(59,130,200,.10);
  background: rgba(59,130,200,.04);
}
.phone-field.has-error {
  border-color: rgba(212,32,32,.55);
  box-shadow: 0 0 0 4px rgba(212,32,32,.08);
  animation: shake .35s var(--ease);
}
.phone-field.has-val {
  border-color: rgba(92,184,130,.30);
}

.flag-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 6px 0 16px;
  flex-shrink: 0;
  cursor: default;
}
.flag-emoji { font-size: 18px; line-height: 1; }
.flag-code {
  font-size: 14px;
  font-weight: 600;
  color: var(--d3);
}
.field-sep {
  width: 1px; height: 20px;
  background: var(--bdr);
  flex-shrink: 0;
  margin: 0 12px;
}
.phone-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--f);
  font-size: max(16px, 1.05em);
  font-weight: 600;
  color: var(--d1);
  letter-spacing: .025em;
  padding: 15px 16px 15px 0;
  caret-color: var(--bl);
  -webkit-appearance: none;
  touch-action: manipulation;
  user-select: auto;
  min-width: 0;
}
.phone-input::placeholder {
  color: var(--d4);
  font-weight: 400;
}

/* Inline error */
.field-error {
  font-size: 12.5px;
  font-weight: 600;
  color: #E05555;
  display: none;
  margin-bottom: 4px;
  padding-left: 2px;
}

/* ─────────────────────────────────────────
   CTA SECTION
───────────────────────────────────────── */
.cta-section {
  padding: 16px clamp(20px,6vw,28px) calc(32px + env(safe-area-inset-bottom,0px));
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative; z-index: 1;
}

/* Sign In button */
.btn-signin {
  width: 100%;
  min-height: 56px;
  padding: 16px 20px;
  border-radius: var(--r-md);
  border: none;
  font-family: var(--f);
  font-size: clamp(15px,4.2vw,17px);
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  touch-action: manipulation;
  transition: transform .12s, box-shadow .15s, background .2s, opacity .2s;
  position: relative;
  overflow: hidden;
  /* Inactive */
  background: rgba(59,130,200,.18);
  color: rgba(59,130,200,.55);
  box-shadow: none;
}
.btn-signin.active {
  background: linear-gradient(135deg, #4A9AE8 0%, #2E6EB5 100%);
  color: #fff;
  box-shadow: 0 6px 24px rgba(59,130,200,.35), 0 1px 0 rgba(255,255,255,.12) inset;
}
.btn-signin.active:active {
  transform: scale(.97);
  box-shadow: 0 2px 10px rgba(59,130,200,.25);
}
.btn-signin.loading {
  pointer-events: none;
  opacity: .75;
}
.btn-signin.success {
  background: linear-gradient(135deg, #5CB882, #3D9460);
  color: #fff;
  box-shadow: 0 6px 24px rgba(92,184,130,.30);
}

/* Spinner */
.spinner {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,.25);
  border-top-color: #fff;
  border-radius: 50%;
  display: none;
  animation: spin .65s linear infinite;
  flex-shrink: 0;
}

/* Biometrics */
.bio-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.bio-line {
  flex: 1;
  height: 1px;
  background: var(--bdr);
}
.bio-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--bdr);
  background: var(--d5);
  font-family: var(--f);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--d3);
  cursor: pointer;
  touch-action: manipulation;
  white-space: nowrap;
  transition: border-color .15s, color .15s, background .15s;
  flex-shrink: 0;
}
.bio-btn:active {
  background: rgba(255,255,255,.06);
  color: var(--d2);
  transform: scale(.97);
}

/* Order Now */
.btn-order {
  width: 100%;
  min-height: 54px;
  padding: 15px 20px;
  border-radius: var(--r-md);
  border: 1.5px solid rgba(59,130,200,.20);
  background: rgba(59,130,200,.07);
  font-family: var(--f);
  font-size: clamp(15px,4.2vw,17px);
  font-weight: 700;
  color: var(--bl);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  touch-action: manipulation;
  transition: transform .12s, background .15s, border-color .15s, box-shadow .15s;
}
.btn-order:active {
  transform: scale(.97);
  background: rgba(59,130,200,.12);
  box-shadow: 0 0 0 4px rgba(59,130,200,.10);
}
.btn-order-arrow {
  font-size: 16px;
  transition: transform .2s var(--spring);
  display: inline-block;
}
.btn-order:hover .btn-order-arrow,
.btn-order:active .btn-order-arrow {
  transform: translateX(3px);
}

/* New patient link */
.new-patient {
  text-align: center;
  font-size: clamp(13px,3.6vw,15px);
  color: var(--d4);
  padding: 2px 0;
}
.new-patient a {
  color: var(--d3);
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: color .15s;
}
.new-patient a:active { color: var(--d2); }

/* ─────────────────────────────────────────
   TRUST STRIP
───────────────────────────────────────── */
.trust {
  padding: 0 clamp(20px,6vw,28px) clamp(16px,4vw,24px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  flex-wrap: wrap;
  row-gap: 4px;
  position: relative; z-index: 1;
}
.trust-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--d4);
  letter-spacing: .04em;
  padding: 0 10px;
  white-space: nowrap;
}
.trust-item:not(:last-child) {
  border-right: 1px solid var(--bdr);
}
.trust-icon { flex-shrink: 0; }

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom,0px));
  left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: rgba(20,28,38,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--d2);
  white-space: nowrap;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: transform .35s var(--spring), opacity .25s;
}
.toast.visible {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
.toast.success { color: var(--grn); }
.toast.error   { color: #E05555; }
</style>
</head>
<body>

<div class="page">

  <!-- Background effects -->
  <div class="bg-glow bg-glow-top"></div>
  <div class="bg-glow bg-glow-bottom"></div>
  <div class="bg-grain"></div>

  <!-- Nav -->
  <nav class="nav anim-0">
    <div class="logo">
      <div class="logo-mark">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="logo-name">GutGuard</span>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-tag anim-1">Patient Portal</div>
    <h1 class="headline anim-2">
      Welcome<br><em>back.</em>
    </h1>
    <p class="subline anim-3">Your score and protocol<br>are waiting for you.</p>
  </div>

  <!-- Form -->
  <div class="form-section anim-3">
    <div class="field-label">Mobile Number</div>
    <div class="phone-field" id="phoneField">
      <div class="flag-wrap">
        <span class="flag-emoji">🇵🇭</span>
        <span class="flag-code">+63</span>
      </div>
      <div class="field-sep"></div>
      <input
        class="phone-input"
        id="phoneInput"
        type="tel"
        inputmode="numeric"
        placeholder="9XX XXX XXXX"
        maxlength="13"
        autocomplete="tel"
        autofocus
      />
    </div>
    <div class="field-error" id="fieldError">Enter a valid Philippine mobile number</div>
  </div>

  <!-- CTAs -->
  <div class="cta-section anim-4">

    <!-- Sign In -->
    <button class="btn-signin" id="signinBtn" onclick="doSignIn()" type="button">
      <span id="signinLabel">Sign In</span>
      <div class="spinner" id="signinSpinner"></div>
    </button>

    <!-- Biometrics -->
    <div class="bio-row">
      <div class="bio-line"></div>
      <button class="bio-btn" onclick="doBiometrics()" type="button">
        <svg class="trust-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        Use Face ID / Fingerprint
      </button>
      <div class="bio-line"></div>
    </div>

    <!-- Order Now — skip sign-in entirely -->
    <button class="btn-order" onclick="doOrderNow()" type="button">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      Order Now
      <span class="btn-order-arrow">→</span>
    </button>

    <!-- New patient -->
    <p class="new-patient">
      New patient? <a onclick="doNewPatient()">Scan My Labs →</a>
    </p>

  </div>

  <!-- Trust strip -->
  <div class="trust anim-5">
    <div class="trust-item">
      <svg class="trust-icon" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      End-to-end private
    </div>
    <div class="trust-item">
      <svg class="trust-icon" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Doctor-monitored
    </div>
    <div class="trust-item">
      <svg class="trust-icon" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      PH labs supported
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────────────────
   ELEMENTS
───────────────────────────────────── */
const phoneField   = document.getElementById('phoneField');
const phoneInput   = document.getElementById('phoneInput');
const signinBtn    = document.getElementById('signinBtn');
const signinLabel  = document.getElementById('signinLabel');
const signinSpinner= document.getElementById('signinSpinner');
const fieldError   = document.getElementById('fieldError');
const toastEl      = document.getElementById('toast');

/* ─────────────────────────────────────
   PHONE FORMATTING & VALIDATION
───────────────────────────────────── */
function getRaw(val) {
  var d = val.replace(/\D/g,'');
  if(d.startsWith('63')) d = d.slice(2);
  if(d.startsWith('0'))  d = d.slice(1);
  return d.slice(0,10);
}
function isValid(raw) {
  return raw.length === 10 && /^9/.test(raw);
}
function formatPhone(raw) {
  if(raw.length > 6) return raw.slice(0,3)+' '+raw.slice(3,6)+' '+raw.slice(6);
  if(raw.length > 3) return raw.slice(0,3)+' '+raw.slice(3);
  return raw;
}

phoneInput.addEventListener('input', function(){
  var raw = getRaw(this.value);
  this.value = formatPhone(raw);
  // Clear error state
  phoneField.classList.remove('has-error');
  fieldError.style.display = 'none';
  // Toggle states
  if(raw.length > 0) phoneField.classList.add('has-val');
  else phoneField.classList.remove('has-val');
  // Activate button
  if(isValid(raw)){
    signinBtn.classList.add('active');
    signinBtn.style.pointerEvents = '';
  } else {
    signinBtn.classList.remove('active');
    signinBtn.style.pointerEvents = 'none';
  }
});

phoneInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter') doSignIn();
});

/* ─────────────────────────────────────
   SIGN IN
───────────────────────────────────── */
function doSignIn() {
  var raw = getRaw(phoneInput.value);
  if(!isValid(raw)){
    phoneField.classList.add('has-error');
    fieldError.style.display = 'block';
    phoneInput.focus();
    return;
  }
  // Loading
  signinLabel.textContent = 'Signing in…';
  signinSpinner.style.display = 'block';
  signinBtn.classList.add('loading');
  phoneInput.blur();

  // Simulate auth → hand off
  setTimeout(function(){
    signinSpinner.style.display = 'none';
    signinBtn.classList.remove('loading');
    signinBtn.classList.add('success');
    signinLabel.textContent = '✓  Signed in';
    showToast('Welcome back! Loading your portal…', 'success');

    // ── Integration point ──────────────────────────────────────────
    // window.location.href = 'patient-portal.html';
    // OR if embedded in patient portal: go('A');
    // ──────────────────────────────────────────────────────────────
  }, 1600);
}

/* ─────────────────────────────────────
   BIOMETRICS
───────────────────────────────────── */
function doBiometrics() {
  showToast('Biometrics not configured on this device', '');
  // Integration: trigger WebAuthn or native bridge
}

/* ─────────────────────────────────────
   ORDER NOW  (skip sign-in)
───────────────────────────────────── */
function doOrderNow() {
  showToast('Opening GutGuard Protocol Store…', '');

  // ── Integration point ──────────────────────────────────────────

/* ─────────────────────────────────────
   TOAST
───────────────────────────────────── */
var toastTimer = null;
function showToast(msg, type) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.className = 'toast' + (type ? ' '+type : '');
  // Force reflow
  toastEl.offsetHeight;
  toastEl.classList.add('visible');
  toastTimer = setTimeout(function(){
    toastEl.classList.remove('visible');
  }, 2600);
}
